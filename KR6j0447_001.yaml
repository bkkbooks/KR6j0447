body:
  text: 南天竺三藏金剛智奉詔譯爾時金剛手虛空庫菩薩摩訶薩觀察天宮諸大菩薩天龍等八部而從座起偏袒右肩白釋迦牟尼佛言乃往古昔無量俱胝大劫為求法故流轉器世間多有波旬王等令我多退佛法唯願薄伽梵聽示現權身說大威神驗真言佛言欲現何權身答曰願現大聖藥叉金剛形過去佛已現現在佛今現未來佛當現我今非過去非現在非未來現我自心三昧忿怒而守護佛法愍念有情佛言善哉大聖欲護持佛法愍念有情仁者善可現權說大靈驗真言我與仁加持護念俱共說真言慈護持者即時未起座現三面六臂大威忿怒為毒形以七珍瓔珞莊身其身長大無量遍身火焰燃如劫焰烟威猛顧視四方如獸王象勇猛誦真言先持行者捧止羽為鈴拳當乳上以觀羽作劍縛置膝上以止羽共第一噁字反拳縮引共第二鑁噁返觀羽羽即二手如鳳威粕米勢共第三噁下止上觀拍節出聲共第四感引二羽磨轉共五發吒互止觀上下三返以拳纏身置頂左三轉成辟除右三轉成結界後以印各押四合瞋目怒口甚怖畏體誦明真言曰曩莫三滿多沒馱南引一阿迦引也二尾曩引也三噁入四毘只迦引也縛日羅菴平引五設咄嚧二合鑁噁引六達磨薩嚩引吒迦爾若以反尾伽哩嚀引尾伽哩嚀引七設咄嚧二合吽引平噁入八訖哩二合訖哩二合九伽𩕳八伽𩕳入引九伽伽𩕳引十感入十一嗚祖主於反摩羅𩕳引設咄嚧吽引十三跋折羅跋折羅十三多伽𩕳引也十四多伽𩕳引也十五娑發吒二合十六娑發吒二合十七吽發吒引二合十八爾時佛說此真言三千大千世界六種震動摩醯首羅等大自在力王眾所居宮殿皆悉散動不得安穩悉雲集來頂戴藥叉金剛唯願大力尊哀愍令得我無畏安樂威德藥叉王白佛言此等魔王等所憂惱如何願何為佛言猶暫令可愍此等得樂即許此等已即時魔王白忿怒王言我俱共加神力守護佛法各退散若有惡人怨結於善人起擾惱法師應當畫神驗忿怒王像隨意大少作三角壇向人所居方作惡心誦上大靈驗真言每日三時二十一遍滿三日已惡人死亡眷屬無殘留若欲甦生取蓮花根擣末以大悲三昧真言一日一夜不飲食滿一百八遍即惡人及眷屬甦於佛法起歸敬二羽合拳屈進力作谷口撥之心起大悲真言曰曩莫三曼多沒馱南引伽𠳿婆羅二合設咄嚧嗚𤙖引平莎嚩二合賀欲得佛法大靈驗先像前作四肘方壇壇中安白銅大器盛滿香水從月一日迄十五日燒香散花致誠禮敬誦大靈驗真言晝夜無間不嘗睡眠全堅固精進且不安居不安立留十五日間無斷絕而滿十萬遍藥叉王自現身加持持誦者即念憐愍有情故示現妙形像二世菩提何非成就即隨喜怖畏被此忿怒尊加持時設諸惡人惡魔惡禽獸乃至厭禱蠱術魑魅魍魎惡鬼神等起惡心欲惱害行人遠近來向行人住處則路中自所殺害此神驗卅里外圍繞令無諸障礙又金剛藥叉為施調伏故說大威怒王根本大心真言是呪印甚祕密故非表儀軌即在別卷親近阿闍梨承事可習學甚密故誦此呪時一切魔王鬼眾不得安穩怖懼之事如大靈驗真言無異呪印別若欲行此呪如聖不動尊念誦儀軌而作法先右膝著地至心歸命一切佛菩薩懺悔無始生死罪障隨喜一切諸佛菩薩所集善根勸請一切如來聖眾發菩提心供養諸佛即勸請真言曰唵一嚩日囉二合藥叉二合也多多那伽梨那二尾𮑱吒引吽吽莎嚩二合賀引澡像真言曰唵吽娑婆嚕儞也二合唅閼伽真言曰唵阿頗羅二合底𩕳引吽奉座真言曰唵尾迦尼左羅尼二噁入著衣瓔珞真言曰唵矩尼矩尼薩矩尼引也伊牟獻香花燈塗真言曰唵摩尼引娜伽伽娜三摩三摩矩囐提噁莎嚩二合賀讚嘆藥叉金剛曰嚩日囉二合噯咄羅藥乞叉嚩日囉二合底哩𩕳尾𮑱梨二合賀𩕳引上嚩日囉二合摩訶藥乞叉上藥乞叉上婆𩕳伽𩕳也引平噁短生歡喜悅意可誦此讚嘆偈善哉善哉噁藥叉憐愍有情我等類無倫比像化含靈何者寧為何惱法加持數珠真言曰唵縛日囉豎尼奉送真言曰唵尾訖灑二合耶吽噁入上所說十種供養讚嘆等真言皆持用三股金剛杵二羽中受鈷當心誦一一真言各應想流出威德執持金剛鈷真言曰唵一參㕹縛日羅二合醯𩕳尾吠縛日羅二合噁若欲一切障難解脫合丸藥二兩各把左右掌踞著者而誦大靈驗真言七遍加持著者塗背後一時解脫一切障難一切口舌橫死短命等若又欲急殺惡人畫人像姓名置調伏壇最初角削竹釘穿立腹中誦大靈驗真言以嚗噁卒怒心呪一百八遍一遍一打便斃又欲急縛惡人令歸佛道以惡心誦大呪三遍取黑石共後發吒羽內迴之自然被縛又欲解免者誦大慈三昧明三遍便得本心即言自今已後歸依佛道更不生起邪見不善心又欲好女自得及令他得松皮書好女姓名繫像前誦大慈三昧真言七遍啟白威怒王如是每日三時繫念白啟威怒王慈愍故自乘好女意不令生他心自從宮宅出跉來愛著夫人更無他念寧他妻非他夫夫厭妻妻厭夫一心一向歸後夫婦妻俱常發菩提心恒教化夫人矣又欲得官位像前至心燒香設種種供養三日三夜乃至七日七夜間可誦大慈三昧真言祈願所願無一不成則作增益法自成就唯修行法時隨念向望方細示方如護摩壇作法已欲出道場誦此真言發遣聖眾真言曰唵嚩日囉二合藥乞叉二合底那底他也二合毘吽吽噁說此等種雜威德瞋怒法時一切魔怨調伏加衛護願護持佛法是故行者修習時慎莫起惡心數損他有智人善悟是祕道輒亂不得誦呪唯除耎和忍辱人年滿四十而得自順順他智者若幼稚人行好習誦時不得解脫道隨自損損他深過行者多應有慈悲利益一切有情界出堂任意而轉讀大乘住不退轉地
